<label class="text-sm font-medium" for="account">{{ label() }}</label>
<p-select
  [(ngModel)]="selectedAccount"
  [options]="accounts()"
  inputId="account"
  optionValue="id"
  [placeholder]="placeholder()"
  class="w-full"
  emptyMessage="No accounts to select"
  appendTo="body"
  [dt]="selectDt"
  [invalid]="isInvalid()"
  (ngModelChange)="onModelChanges($event)"
>
  <ng-template #selectedItem let-selectedOption>
    <div class="flex items-center gap-2">
      <div>{{ selectedOption.name }}</div>
      <app-currency-code-chip [currencyCode]="selectedOption.currencyCode" />
    </div>
  </ng-template>
  <ng-template let-account #item>
    <div class="flex items-center gap-2">
      <div>{{ account.name }}</div>
      <div
        class="text-xs font-medium px-2 py-1 bg-gray-100 dark:bg-gray-800 rounded-lg"
      >
        {{ account.currencyCode }}
      </div>
    </div>
  </ng-template>
</p-select>
@if (isInvalid()) {
  <div class="text-xs text-red-500 pl-2 pt-0.5">Should be selected</div>
}
