<p-floatlabel class="w-50" variant="on">
  <p-datepicker
    [ngModel]="year()"
    (ngModelChange)="onYearChange($event)"
    view="year"
    dateFormat="yy"
    class="w-full"
    [readonlyInput]="true"
    inputId="year"
    size="small"
    [inputStyle]="{ borderRadius: '12px' }"
  />
  <label for="year">Year</label>
</p-floatlabel>

<p-floatlabel class="w-40" variant="on">
  <p-select
    [ngModel]="status()"
    (ngModelChange)="onStatusChange($event)"
    [options]="statuses()"
    optionLabel="label"
    class="w-full"
    size="small"
    inputId="status"
    [dt]="{
      root: {
        borderRadius: '12px',
      },
    }"
  />
  <label for="status">Status</label>
</p-floatlabel>
