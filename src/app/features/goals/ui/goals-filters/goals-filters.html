<p-floatlabel class="w-60" variant="on">
  <p-datepicker
    [(ngModel)]="year"
    view="year"
    dateFormat="yy"
    class="w-full"
    [readonlyInput]="true"
    inputId="year"
    size="small"
    [inputStyle]="{ borderRadius: '12px' }"
  />
  <label for="year">Year</label>
</p-floatlabel>

<p-floatlabel class="w-30" variant="on">
  <p-select
    [(ngModel)]="status"
    [options]="statuses()"
    optionLabel="name"
    class="w-full"
    size="small"
    inputId="status"
    [dt]="{
      root: {
        borderRadius: '12px',
      },
    }"
  />
  <label for="status">Status</label>
</p-floatlabel>
