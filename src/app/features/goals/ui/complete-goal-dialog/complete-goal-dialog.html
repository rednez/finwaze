<p-dialog
  [header]="'goals.completeDialog.title' | translate"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '24rem' }"
  [draggable]="false"
  [resizable]="false"
>
  <div class="flex flex-col gap-4 pt-2">
    <div
      class="flex items-start gap-2 p-3 rounded-xl bg-emerald-50 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300"
    >
      <i class="pi pi-check-circle mt-0.5 shrink-0"></i>
      <p class="text-sm text-start">
        {{ 'goals.completeDialog.description' | translate }}
      </p>
    </div>

    <div class="flex flex-col gap-1">
      <span class="text-sm text-surface-500">{{
        'goals.completeDialog.amountToTransfer' | translate
      }}</span>
      <span class="text-xl font-medium">
        {{ goal().accumulatedAmount | currency: goal().currencyCode }}
      </span>
    </div>

    <form [formGroup]="form">
      <app-account-select
        formControlName="toAccountId"
        [accounts]="accounts()"
        class="text-start"
        [label]="'goals.completeDialog.transferFundsTo' | translate"
        [isInvalid]="
          form.controls.toAccountId.invalid && form.controls.toAccountId.touched
        "
      />
    </form>
  </div>

  <ng-template #footer>
    <p-button
      [label]="'goals.completeDialog.keepSaving' | translate"
      severity="secondary"
      [text]="true"
      (onClick)="close()"
    />
    <p-button
      [label]="'goals.completeDialog.completeGoal' | translate"
      severity="success"
      (onClick)="confirm()"
    />
  </ng-template>
</p-dialog>
