<section class="flex-1">
  <div
    class="flex flex-col-reverse sm:flex-row justify-end sm:justify-between gap-4"
  >
    <app-budget-filters
      class="grow"
      [currencies]="accountsStore.myCurrencies()"
      [initialCurrency]="budgetStore.currencyCode() || undefined"
      [initialMonth]="budgetStore.month()"
      [initialGroupsIds]="totalBudgetStore.selectedGroupsIds()"
      [groups]="totalBudgetStore.groupsMonthlyBudgets()"
      (monthChanged)="onMonthChanged($event)"
      (currencyChanged)="onCurrencyChanged($event)"
      (statusChanged)="onStatusChanged($event)"
      (groupsIdsChanged)="onSelectedGroupsIdsChanged($event)"
    />

    <p-button
      class="shrink-0 self-end sm:self-auto"
      icon="pi pi-plus"
      label="Add new budget"
      [rounded]="true"
      size="large"
      (onClick)="gotoCreateBudget()"
      [dt]="{ root: { lg: { fontSize: '14px' } } }"
    />
  </div>

  <div class="flex gap-4 flex-wrap mt-4">
    @for (group of totalBudgetStore.filteredBudgets(); track group.id) {
      <app-budget-card
        class="flex-1"
        [name]="group.name"
        [plannedAmount]="group.plannedAmount"
        [spentAmount]="group.spentAmount"
        [currencyCode]="budgetStore.currencyCode() || undefined"
      >
        <p-button
          card-actions
          [label]="`${group.categoriesCount} categories`"
          severity="primary"
          variant="outlined"
          rounded
          size="small"
          icon="pi pi-arrow-right"
          iconPos="right"
          (onClick)="gotoBudgetByGroup(group.id, group.name)"
      /></app-budget-card>
    }
  </div>
</section>

<section class="flex flex-col gap-4 grow md:max-w-100">
  <app-monthly-summary-card
    name="Monthly budget"
    [plannedAmount]="totalBudgetStore.monthlyBudgetTotals.plannedAmount()"
    [spentAmount]="totalBudgetStore.monthlyBudgetTotals.spentAmount()"
    [currency]="budgetStore.currencyCode() || undefined"
  />

  <app-budget-most-expenses-card [expenses]="mostExpenses()" />
</section>
