<section class="flex-1">
  <div
    class="flex flex-col-reverse sm:flex-row justify-end sm:justify-between gap-4"
  >
    <app-budget-filters
      class="grow"
      [currencies]="accountsStore.myCurrencies()"
      [initialCurrency]="budgetStore.currencyCode() || undefined"
      [initialMonth]="budgetStore.month()"
      [initialGroupsIds]="totalBudgetStore.selectedGroupsIds()"
      [groups]="totalBudgetStore.monthlyBudgets()"
      (monthChanged)="onMonthChanged($event)"
      (currencyChanged)="onCurrencyChanged($event)"
      (statusChanged)="onStatusChanged($event)"
      (groupsIdsChanged)="onSelectedGroupsIdsChanged($event)"
    />

    @if (totalBudgetStore.monthlyBudgets().length > 0) {
      <p-button
        class="shrink-0 self-end sm:self-auto"
        icon="pi pi-pencil"
        label="Edit budget"
        [rounded]="true"
        size="large"
        (onClick)="gotoEditBudget()"
        [dt]="{ root: { lg: { fontSize: '14px' } } }"
      />
    } @else {
      <p-button
        class="shrink-0 self-end sm:self-auto"
        icon="pi pi-plus"
        label="Add new budget"
        [rounded]="true"
        size="large"
        (onClick)="gotoCreateBudget()"
        [dt]="{ root: { lg: { fontSize: '14px' } } }"
      />
    }
  </div>

  @if (totalBudgetStore.isMonthlyBudgetsLoading()) {
    <div class="flex gap-4 flex-wrap mt-4">
      <app-budget-card [loading]="true" />
    </div>
  } @else {
    @if (totalBudgetStore.monthlyBudgets().length !== 0) {
      <div class="flex gap-4 flex-wrap mt-4">
        @for (group of totalBudgetStore.filteredBudgets(); track group.id) {
          <app-budget-card
            class="flex-1"
            [name]="group.name"
            [plannedAmount]="group.plannedAmount"
            [spentAmount]="group.spentAmount"
            [currencyCode]="budgetStore.currencyCode() || undefined"
          >
            <p-button
              card-actions
              [label]="`${group.categoriesCount} categories`"
              severity="primary"
              variant="outlined"
              rounded
              size="small"
              icon="pi pi-arrow-right"
              iconPos="right"
              (onClick)="gotoBudgetByGroup(group.id)"
            />
          </app-budget-card>
        }
      </div>
    } @else {
      <app-empty-state
        title="No budgets for this month in selected currency"
        description="Start by creating a new budget and assigning it to a group or create a group with categories and assign budgets to them."
        primaryButtonText="Create budget"
        primaryButtonIcon="add"
        icon="donut_small"
        (primaryActionClicked)="gotoCreateBudget()"
      />
    }
  }
</section>

<section class="flex flex-col gap-4 grow md:max-w-100">
  <app-monthly-summary-card
    name="Monthly budget"
    [loading]="totalBudgetStore.isMonthlyBudgetTotalsLoading()"
    [plannedAmount]="totalBudgetStore.monthlyBudgetTotals.plannedAmount()"
    [spentAmount]="totalBudgetStore.monthlyBudgetTotals.spentAmount()"
    [currency]="budgetStore.currencyCode() || undefined"
    (crateBudget)="gotoCreateBudget()"
  />

  <app-budget-most-expenses-card
    [loading]="totalBudgetStore.isMonthlyExpensesLoading()"
    [currency]="budgetStore.currencyCode() || undefined"
    [expenses]="totalBudgetStore.monthlyExpenses()"
  />
</section>
