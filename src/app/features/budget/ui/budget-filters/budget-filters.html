<div class="flex gap-2 flex-wrap">
  <p-floatlabel class="w-30" variant="on">
    <p-datepicker
      [(ngModel)]="month"
      view="month"
      dateFormat="mm/yy"
      [readonlyInput]="true"
      inputId="budget-month"
      size="small"
      [inputStyle]="{ borderRadius: '12px' }"
    />
    <label for="budget-month">Month</label>
  </p-floatlabel>

  <p-floatlabel class="w-30" variant="on">
    <p-select
      [(ngModel)]="currency"
      [options]="currencies()"
      optionLabel="name"
      class="w-full"
      size="small"
      inputId="currency"
      [dt]="{
        root: {
          borderRadius: '12px',
        },
      }"
    />
    <label for="currency">Currency</label>
  </p-floatlabel>

  <p-floatlabel class="w-40" variant="on">
    <p-select
      [(ngModel)]="status"
      [options]="statuses()"
      optionLabel="name"
      class="w-full"
      size="small"
      inputId="status"
      [dt]="{
        root: {
          borderRadius: '12px',
        },
      }"
    />
    <label for="status">Status</label>
  </p-floatlabel>
</div>

<p-multiselect
  [options]="groups()"
  [(ngModel)]="selectedGroups"
  optionLabel="name"
  placeholder="Select groups"
  [maxSelectedLabels]="3"
  [showClear]="true"
  display="chip"
  inputId="groups"
  class="text-sm"
  [dt]="{
    root: {
      borderRadius: '12px',
    },
    chip: {
      borderRadius: '16px',
    },
  }"
/>
