<p-floatlabel class="w-30" variant="on">
  <p-datepicker
    [ngModel]="month()"
    (ngModelChange)="onMonthChange($event)"
    view="month"
    dateFormat="mm/yy"
    inputId="month"
    size="small"
    [readonlyInput]="true"
    [inputStyle]="{ borderRadius: '12px' }"
  />
  <label for="month">{{ 'shared.month' | translate }}</label>
</p-floatlabel>

<p-floatlabel class="w-30" variant="on">
  <p-select
    [ngModel]="currency()"
    (ngModelChange)="onCurrencyChange($event)"
    [options]="currencies()"
    optionLabel="name"
    class="w-full"
    size="small"
    [dt]="{ root: { borderRadius: '12px' } }"
  />
  <label for="dd-currency">{{ 'shared.currency' | translate }}</label>
</p-floatlabel>

<p-multiselect
  [options]="accounts()"
  [ngModel]="selectedAccounts()"
  (ngModelChange)="onAccountsChange($event)"
  optionLabel="name"
  [placeholder]="'analytics.filters.selectAccounts' | translate"
  [maxSelectedLabels]="3"
  [showToggleAll]="false"
  [filter]="false"
  display="chip"
  class="text-sm"
  [dt]="{ root: { borderRadius: '12px' }, chip: { borderRadius: '12px' } }"
/>
