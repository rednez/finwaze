<p-floatlabel class="w-38" variant="on">
  <p-select
    [ngModel]="selectedTransactionType()"
    (ngModelChange)="onTransactionTypeChange($event)"
    [options]="transactionTypesOptions()"
    optionLabel="name"
    optionValue="value"
    inputId="transaction-type"
    size="small"
    class="w-full"
    [dt]="selectInputSchema"
  />
  <label for="transaction-type">{{
    'groups.filters.transactionType' | translate
  }}</label>
</p-floatlabel>
