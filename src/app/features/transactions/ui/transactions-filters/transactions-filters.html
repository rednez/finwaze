<p-floatlabel class="sm:w-30" variant="on">
  <p-datepicker
    [ngModel]="selectedMonth()"
    (ngModelChange)="onMonthChange($event)"
    view="month"
    dateFormat="mm/yy"
    inputId="budget-month"
    [readonlyInput]="true"
    size="small"
    [inputStyle]="{ borderRadius: '12px' }"
  />
  <label for="budget-month">Budget month</label>
</p-floatlabel>

<p-floatlabel class="sm:w-30" variant="on">
  <p-select
    [ngModel]="selectedType()"
    (ngModelChange)="onTypeChange($event)"
    [options]="typesOptions()"
    optionLabel="name"
    optionValue="value"
    inputId="transaction-type"
    size="small"
    class="w-full"
    [dt]="selectInputSchema"
  />
  <label for="transaction-type">Type</label>
</p-floatlabel>

<p-floatlabel class="sm:w-30" variant="on">
  <p-select
    [ngModel]="selectedCurrency()"
    (ngModelChange)="onCurrencyChange($event)"
    [options]="currenciesOptions()"
    optionLabel="name"
    optionValue="name"
    class="w-full"
    size="small"
    inputId="currency"
    [dt]="selectInputSchema"
  />
  <label for="currency">Currency</label>
</p-floatlabel>

<p-floatlabel class="sm:w-36" variant="on">
  <p-select
    [ngModel]="selectedGroup()"
    (ngModelChange)="onGroupChange($event)"
    [options]="groupsOptions()"
    optionLabel="name"
    optionValue="id"
    class="w-full"
    size="small"
    inputId="group"
    [dt]="selectInputSchema"
  />
  <label for="group">Group</label>
</p-floatlabel>

<p-floatlabel class="sm:w-36" variant="on">
  <p-select
    [ngModel]="selectedCategory()"
    (ngModelChange)="onCategoryChange($event)"
    [options]="categoriesOptions()"
    optionLabel="name"
    optionValue="id"
    class="w-full"
    size="small"
    inputId="category"
    [dt]="selectInputSchema"
  />
  <label for="category">Category</label>
</p-floatlabel>
