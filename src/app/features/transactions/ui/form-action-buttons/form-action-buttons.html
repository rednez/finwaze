@if (isCreatingMode()) {
  <p-button
    [label]="'transactions.formActions.create' | translate"
    rounded
    icon="pi pi-plus"
    [loading]="isSubmitting()"
    (onClick)="clickSubmit.emit()"
  />
} @else {
  <p-button
    [label]="'transactions.formActions.saveChanges' | translate"
    rounded
    icon="pi pi-save"
    [loading]="isSubmitting()"
    (onClick)="clickSubmit.emit()"
  />
  <p-button
    [label]="'shared.delete' | translate"
    rounded
    severity="danger"
    variant="outlined"
    icon="pi pi-trash"
    (onClick)="clickDelete.emit()"
  />
}
